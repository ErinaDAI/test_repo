      cc:
      - erina.smiles@digital.ai
      bcc:
      - smiledeveloper@gmail.com
      replyTo: admin@gmail.com
      from: erina.smiles@digital.ai
      senderUsername: erina.smiles@digital.ai
      priority: High
    color: "#3d6c9e"
  tags:
  - showcase
  variables:
  - type: xlrelease.StringVariable
    key: user_comment
    label: User Comment
    description: User input provided during release execution
  scriptUsername: admin
  scriptUserPassword: !value "xlrelease_Release_Task_Showcase_scriptUserPassword"
  riskProfile: Default risk profile
  author: admin
