---
apiVersion: xl-release/v1
kind: Templates
metadata:
  path: /
  home: Restricted Team
spec:
- template: Task Showcase
  scheduledStartDate: 2026-04-07T03:30:00Z
  phases:
  - phase: showcase phase
    tasks:
    - name: verify test case
      type: xlrelease.Task
      owner: smiletester
    - name: get user input
      type: xlrelease.UserInputTask
      description: Please enter the required information below.
      owner: admin
      variables:
      - user_comment
