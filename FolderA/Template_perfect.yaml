# Exported from:        http://erina:5516/
# Release version:      26.3.0-SNAPSHOT

---
apiVersion: xl-release/v1
kind: Templates
metadata:
  path: /
  home: FolderA
spec:
- template: perfect
  scheduledStartDate: 2026-07-10T09:00:00+05:30
  phases:
  - phase: New Phase
    tasks:
    - name: create release
      type: xlrelease.GroovyScriptTask
      ignoreScriptVariableInterpolation: true
      script: |-
        xlr {

            release("BusinessFlowRelease") {

                description "Created through Groovy DSL"

                phases {

                    phase("Build") {

                        tasks {

                            manual("Compile") {
                            }

                            manual("Unit Test") {
                            }
                        }
                    }

                    phase("Deploy") {

                        tasks {

                            manual("Deploy") {
                            }

                            manual("Smoke Test") {
                            }
                        }
                    }
                }
            }
        }
    - name: validate release
      type: xlrelease.ScriptTask
      script: |-
        releases = releaseApi.searchReleasesByTitle("BusinessFlowRelease")

        print("Found Releases = " + str(len(releases)))

        for r in releases:

            print("Title = " + str(r.title))
            print("ID = " + str(r.id))
            print("Status = " + str(r.status))
    - name: rename release
      type: xlrelease.ScriptTask
      script: |-
        releases = releaseApi.searchReleasesByTitle("BusinessFlowRelease")

        for r in releases:

            print("Old Title = " + r.title)

            r.title = "BusinessFlowRelease_Renamed"

            releaseApi.updateRelease(r)

            print("New Title = " + r.title)
    - name: validate renamed release
      type: xlrelease.ScriptTask
      script: |-
        releases = releaseApi.searchReleasesByTitle(
            "BusinessFlowRelease_Renamed"
        )

        print("Found Releases = " + str(len(releases)))

        for r in releases:

            print("Title = " + r.title)
            print("ID = " + str(r.id))
            print("Status = " + str(r.status))
    - name: build validation and skip
      type: xlrelease.ScriptTask
      script: |-
        r = getCurrentRelease()

        for t in r.getAllTasks():

            try:

                if str(t.title) == "Deploy_To_QA":

                    taskApi.skipTask(
                        t.id,
                        "Skipping because Jenkins build failed"
                    )

                    print("Skipped: " + str(t.title))

            except Exception as e:

                print(e)
    - name: Deploy_To_QA
      type: xlrelease.Task
      owner: admin
    - name: Smoke_Test
      type: xlrelease.Task
      owner: admin
    - name: validate active tasks
      type: xlrelease.ScriptTask
      script: |-
        tasks = releaseApi.getActiveTasks(release.id)

        print("Active Tasks = " + str(len(tasks)))

        for t in tasks:

            try:
                print(t.title)
            except:
                print(t)
    - name: activity logs
      type: xlrelease.ScriptTask
    - name: runtime validation
      type: xlrelease.ScriptTask
      script: |-
        from java.lang import System

        print("Java Version = " + System.getProperty("java.version"))

        print("Java Vendor = " +
              System.getProperty("java.vendor"))

        print("OS Name = " +
              System.getProperty("os.name"))
  riskProfile: Default risk profile
  author: admin
